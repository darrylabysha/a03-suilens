apiVersion: v1
kind: Namespace
metadata:
  name: suilens-2206082846
---
# --- DATABASES ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-db
  namespace: suilens-2206082846
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-db
  template:
    metadata:
      labels:
        app: catalog-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: catalog
            - name: POSTGRES_PASSWORD
              value: catalog
            - name: POSTGRES_DB
              value: catalog
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-db
  namespace: suilens-2206082846
spec:
  selector:
    app: catalog-db
  ports:
    - port: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-db
  namespace: suilens-2206082846
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-db
  template:
    metadata:
      labels:
        app: order-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: orders
            - name: POSTGRES_PASSWORD
              value: orders
            - name: POSTGRES_DB
              value: orders
---
apiVersion: v1
kind: Service
metadata:
  name: order-db
  namespace: suilens-2206082846
spec:
  selector:
    app: order-db
  ports:
    - port: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-db
  namespace: suilens-2206082846
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-db
  template:
    metadata:
      labels:
        app: notification-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: notifications
            - name: POSTGRES_PASSWORD
              value: notifications
            - name: POSTGRES_DB
              value: notifications
---
apiVersion: v1
kind: Service
metadata:
  name: notification-db
  namespace: suilens-2206082846
spec:
  selector:
    app: notification-db
  ports:
    - port: 5432
---
# --- MESSAGE BROKER ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: suilens-2206082846
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          ports:
            - containerPort: 5672
            - containerPort: 15672
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: suilens-2206082846
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
    - name: management
      port: 15672
---
# --- SERVICES ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: suilens-2206082846
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      containers:
        - name: catalog-service
          image: darrylabysha/catalog-service:latest
          ports:
            - containerPort: 3001
          env:
            - name: DATABASE_URL
              value: postgres://catalog:catalog@catalog-db:5432/catalog
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: suilens-2206082846
spec:
  selector:
    app: catalog-service
  ports:
    - port: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: suilens-2206082846
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: darrylabysha/order-service:latest
          ports:
            - containerPort: 3002
          env:
            - name: DATABASE_URL
              value: postgres://orders:orders@order-db:5432/orders
            - name: CATALOG_SERVICE_URL
              value: http://catalog-service:3001
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: suilens-2206082846
spec:
  selector:
    app: order-service
  ports:
    - port: 3002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: suilens-2206082846
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: darrylabysha/notification-service:latest
          ports:
            - containerPort: 3003
          env:
            - name: DATABASE_URL
              value: postgres://notifications:notifications@notification-db:5432/notifications
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: suilens-2206082846
spec:
  selector:
    app: notification-service
  ports:
    - port: 3003
---
# --- FRONTEND ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: suilens-2206082846
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: darrylabysha/frontend:latest
          ports:
            - containerPort: 5173
          env:
            - name: VITE_CATALOG_API
              value: http://127.0.0.1:3001
            - name: VITE_ORDER_API
              value: http://127.0.0.1:3002
            - name: VITE_NOTIFICATION_WS
              value: ws://127.0.0.1:3003/ws
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: suilens-2206082846
spec:
  selector:
    app: frontend
  ports:
    - port: 5173